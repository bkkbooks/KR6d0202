body:
  text: 四明尊者知禮儀軌始集華山律師讀體刪文重纂嘉禾沙門寂暹補像較梓南無大悲觀世音菩薩三稱一切恭謹一心頂禮十方常住三寶一禮畢燒香散華首者唱是諸衆等各各胡跪嚴持香華如法供養願此香華雲遍滿十方界一一諸佛土無量香莊嚴具足菩薩道成就如來香想云我此香華遍十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴遍至十方三寶前十方法界三寶前悉有我身修供養一一皆悉遍法界彼彼無雜無障礙盡未來際作佛事普熏法界諸衆生蒙熏皆發菩提心同入無生證佛智供養已一切恭謹唱已一禮南無過去正法明如來現前觀世音菩薩成妙功德具大慈悲於一身心現千手眼照見法界護持衆生令發廣大道心教持圓滿神呪永離惡道得生佛前無間重愆纏身惡疾莫能救濟悉使消除三昧辨才現生求願皆令果遂決定無疑能使速獲三乘早登佛地威神之力歎莫能窮故我一心歸命頂禮一心頂禮本師釋迦牟尼世尊想云能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦如來影現中我身影現釋迦前頭面接足歸命禮如禮阿彌陀佛即云阿彌陀佛影現中云云禮僧但改為菩薩等下隨位倣此一心頂禮西方極樂世界阿彌陀世尊一心頂禮過去無量億劫千光王靜住世尊一心頂禮過去九十九億殑伽沙諸佛世尊一心頂禮過去無量劫正法明世尊一心頂禮十方一切諸佛世尊一心頂禮賢劫千佛三世一切諸佛世尊大衆聞罄上香一心頂禮廣大圓滿無閡大悲心大陀羅尼神妙章句三稱三禮想云真空法性如虗空常住法寶難思議我身影現法寶前一心如法歸命禮一心頂禮觀音所說諸陀羅尼及十方三世一切尊法大衆上香一心頂禮千手千眼大慈大悲觀世音自在菩薩摩訶薩三稱三禮想云能禮所禮性空寂感應道交難思議我此道場如帝珠大悲菩薩影現中我身影現大悲前為求滅障接足禮一心頂禮大勢至菩薩摩訶薩一心頂禮總持王菩薩摩訶薩一心頂禮日光菩薩月光菩薩摩訶薩一心頂禮寶王菩薩藥王菩薩藥上菩薩摩訶薩一心頂禮華嚴菩薩大莊嚴菩薩寶藏菩薩摩訶薩一心頂禮德藏菩薩金剛藏菩薩虗空藏菩薩摩訶薩經云若有比丘比丘尼優婆塞優婆夷童男童女欲誦持者於諸衆生起慈悲心先當從我發如是願衆隨舉以下一字一擊引磬南無大悲觀世音願我速知一切法南無大悲觀世音願我早得智慧眼南無大悲觀世音願我速度一切衆南無大悲觀世音願我早得善方便南無大悲觀世音願我速乘般若船南無大悲觀世音願我早得越苦海南無大悲觀世音願我速得戒定道南無大悲觀世音願我早登涅槃山南無大悲觀世音願我速會無為舍南無大悲觀世音願我早同法性身我若向刀山刀山自摧折我若向火湯火湯自枯竭我若向地獄地獄自消滅我若向餓鬼餓鬼自飽滿我若向修羅惡心自調伏我若向畜生自得大智慧行者想身對此佛菩薩前稱念尊名惟在哀切如遭焚溺求於救濟南無觀世音菩薩南無阿彌陀佛稱念稍急各十聲至第四第七高揭首句末字俱聲大磬佛號終收一下拜起問訊主者舉觀世音菩薩白佛言世尊若諸衆生誦持大悲神呪墮三惡道者我誓不成正覺誦持大悲神呪若不生諸佛國者我誓不成正覺誦持大悲神呪若不得無量三昧辨才者我誓不成正覺誦持大悲神呪於現在生中一切所求若不果遂者不得為大悲心陀羅尼也乃至說是語已於衆會前合掌正住於諸衆生起大悲心開顏含笑即說如是廣大圓滿無閡大悲心大陀羅尼神妙章句陀羅尼曰南無喝囉怛娜哆囉夜㖿一此是觀世音菩薩本身大須慈悲用心讀誦勿高聲神性急南無阿唎㖿二此是如意輪菩薩本身到此須存心婆盧羯帝爍鉢囉㖿三此是持鉢觀世音菩薩本身若欲取舍利骨誦此存想菩薩持鉢菩提薩埵婆㖿四此是不空羂索菩薩押大兵摩訶薩埵婆㖿五此是菩薩種子自誦呪之本身也摩訶迦盧尼迦㖿六此是馬鳴菩薩本身手把鈸折羅即是唵七此唵是諸鬼神合掌聽誦呪也薩皤囉罰曳八此四大天王之本身降魔數怛那怛寫九此是四大天王部落鬼神名字也南無悉吉栗埵伊𫎇呵唎㖿十此是龍樹菩薩本身大須用心誦此勿疏失菩薩性急婆盧吉帝室佛羅楞䭾婆十一此是圓滿報身盧舍那佛南無那囉謹墀十二此是清淨法身毗盧遮那佛本身大須用心醯唎摩訶皤哆沙咩十三羊鳴此是羊頭神王共諸天魔為眷屬薩婆阿他豆輸朋十四此是甘露菩薩亦是觀世音菩薩部落以為眷屬也阿逝孕十五此是飛騰夜叉天王巡歷四方察其是非也薩婆薩哆那摩婆薩哆那摩婆伽十六此是婆加帝神王其形黑大以豹皮為裩手把鐵叉摩罰特豆十七此是軍吒利菩薩本身把鐵輪并把索而有三眼是也怛姪他十八此是劍語唵阿婆盧醯十九盧迦帝二十此是大梵天王本身神仙為部落迦羅帝二十一此是帝神長大黑色也夷醯唎二十二此是三十三天是魔醯首羅天神領天兵青色摩訶菩提薩埵二十三此是實心更無雜亂心即名薩埵薩婆薩婆二十四此是香積菩薩押五方鬼兵以為侍從不可思議摩囉摩囉二十五此是菩薩相罰語即為齊也摩醯摩醯唎䭾孕二十六同前俱盧俱盧羯幪二十七此是空身菩薩押天大將軍領二十萬億天兵也度盧度盧罰闍耶帝二十八此是嚴峻菩薩押孔雀蠻兵也摩訶罰闍耶帝二十九同前陀羅陀羅三十此是觀世音菩薩大丈夫身即是也地唎尼三十一此是師子王兵驗讀誦室佛囉㖿三十二此是霹𮦷菩薩降伏諸魔眷屬遮囉遮囉三十三此是摧碎菩薩本身手把金輪摩摩某甲受持罰摩囉三十四此是大降魔金剛本身把金輪穆帝𭋸三十五此是諸佛合掌聽誦真言伊醯移醯三十六此是魔醯首羅天王室那室那三十七同前阿囉嘇佛囉舍利三十八此是觀世音菩薩把牌弩弓箭也罰沙罰嘇三十九同前佛囉舍耶四十此是阿彌陀佛本身觀世音菩薩師主呼盧呼盧摩囉四十一此是八部鬼神王呼盧呼盧醯唎四十二同前娑囉娑囉四十三此是五濁惡世也悉唎悉唎四十四此是觀世音菩薩利益一切衆生不可思議蘇嚧蘇嚧四十五此是諸佛樹葉落聲菩提夜菩提夜四十六此是觀世音菩薩結緣衆生菩䭾夜菩䭾夜四十七此是阿難本身也彌帝唎夜四十八此是大車菩薩手把金刀那囉謹墀四十九此是龍樹菩薩手把金刀之處地唎瑟尼那五十此是寶幢菩薩手持鐵叉是也波夜摩那五十一此是寶金光幢菩薩鈸折羅杵娑婆訶去聲五十二悉陀夜五十三此是達一切法門娑婆訶去聲五十四摩訶悉陀夜五十五此是放光菩薩手把赤幡娑婆訶去聲五十六悉陀喻藝五十七此是諸天菩薩盡悉以集手把金刀室皤囉夜五十八此是安息香也娑婆訶去聲五十九那囉謹墀六十山海慧菩薩本身手把金刀娑婆訶去聲六十一摩羅那羅六十二此是寶即王菩薩手把金斧娑婆訶去聲六十三悉囉僧阿穆佉耶六十四此是藥王菩薩本身行療諸病娑婆訶去聲六十五娑婆摩訶阿悉陀㖿六十六此是藥上菩薩本身行療諸病娑婆訶去聲六十七者吉囉阿悉陀夜同聲六十八娑婆訶去聲六十九波陀摩羯悉哆夜同聲七十娑婆訶去聲七十一那囉謹墀皤伽囉㖿七十二娑婆訶七十三摩婆利勝羯囉夜七十四娑婆訶七十五南無喝囉怛那哆囉夜耶七十六南無阿唎㖿七十七婆盧吉帝七十八爍皤囉夜七十九娑婆訶八十悉殿都八十一漫哆羅八十二跋䭾耶八十三娑婆訶八十四觀世音菩薩說此呪已大地六變震動天雨寶華繽紛而下十方諸佛悉皆歡喜天魔外道恐怖毛竪一切衆會皆獲果證或得須陀洹果或得斯陀含果或得阿那含果或得阿羅漢果者或得一地二地三四五地乃至十地者無量衆生發菩提心一拜默念我及衆生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與衆生同為一切重罪所障今對觀音十方佛前普為衆生歸命懺悔惟願加護令障消滅念已跪唱云普為四恩三有法界衆生悉願斷除三障歸命懺悔唱已五體投地心復念言我與衆生無始來今由愛見故內計我人外加惡友不隨喜他一毫之善惟遍三業廣造衆罪事雖不廣惡心遍布晝夜相續無有間斷覆諱過失不欲人知不畏惡道無漸無愧撥無因果故於今日深信因果生重慚愧生大怖畏發露懺悔斷相續心發菩提心斷惡修善勤策三業翻昔重過隨喜凡聖一毫之善念十方佛有大福慧能救我及諸衆生從二死海置三德岸從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡惟願觀音慈悲攝受想訖跪唱云至心懺悔弟子某等與法界一切衆生現前一心本具千法皆有神力及以智明上等佛心下同含識無始暗動障此靜明觸事昏迷舉心縛著平等法中起自他想愛見為本身口為緣於諸有中無罪不造十惡五逆謗法謗人破戒破齊毀塔壞寺偷僧祇物污淨梵行侵損常住飲食財物千佛出世不通懺悔如是等罪無量無邊捨茲形命合墮三途備形萬苦復於現世衆惱交煎或惡疾縈纏他緣逼迫障於道法不得熏修今遇一拜大悲圓滿神呪速能滅除如是罪障故於今日至心誦持歸向一拜觀世音菩薩及十方大師發菩提心修真言行與諸衆生發露衆罪求乞懺悔畢竟消除惟願一拜大悲觀世音菩薩摩訶薩千手護持千眼照見令我等內外障緣寂滅自他行願圓成開本見知制諸魔外三業精進修淨土因至捨此身更無他趣決定得生一拜阿彌陀佛極樂世界親承供養大悲觀音具諸總持廣度羣品皆出苦輪同到智地次起立云懺悔發願已歸命禮三寶一拜南無十方佛南無十方法南無十方僧南無本師釋迦牟尼佛南無阿彌陀佛南無千光王靜住佛南無廣大圓滿無礙大悲心大陀羅尼南無千手千眼觀世音菩薩南無大勢至菩薩南無總持王菩薩自歸依佛當願衆生紹隆佛種發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆本茲心非心幻出千手眼剎剎用全彰塵塵體應現觀盡世間音耳根悉照見稽首大悲陀羅尼尋聲救苦不思議一毫端上非他物畟塞虗空渠即伊噫嘻普運含靈登覺岸千差萬別總相宜又從不立文字處向未彰名相時且道畢竟喚甚麼非思量際絶言思真如兮如是自在兮在茲拈出個中關棙子不妨好事大家知此大悲心呪出像暹自髫年所得敬誦久之至康熙乙卯始合刻懺法今于己卯冬參閲數本最可法者纂入重輯公諸同志寂暹拜讚并識白描盡善字畫尤寄唐言不是梵語亦非幻住隨喜手加額喚作觀音古大悲西天目山沙門明本再拜併題于卷之尾云觀音大智土具大悲心者善說陀羅尼大悲救一切我今發弘誓持此大悲心無礙陀羅尼光明從頂出遍照我此土及以十方界下際風輪際上至有頂天彌樓與鐵圍大海江河水是中諸衆生蒙光皆獲益離苦得解脫悉發菩提心盡此一報身同生極樂國願此大悲心光明照十方所有虗空界微塵衆佛剎彼土諸如來皆生大歡喜方便願智力慈哀加被我各於無見頂普放大悲光從彼微塵方咸來灌我頂滅我一切罪成我一切願令我早具足無礙大悲心如諸佛世尊廣度於一切本師釋迦尊說此大悲經我於此經中決定信無疑願我於未來當成一切智以此大悲心廣大作佛事供養恆沙佛度脫諸衆生如觀音菩薩能救世間苦右此偈比丘自如日常誦呪私發願文淨明道者大啓悲誓持此章句課誦忘歲月至大庚戌春得此經卷適符本願此大士付囑流通之意也一日捧經請書前偈因謂之曰大士無身示身千手千眼無語示語章句音聲若能於形相語言之外信受奉行非唯觀世音我亦從中證建安自如呪音充徹一切處如大風輪持大地若佛菩薩天仙於喉舌中吐光熾滅除歷劫業障因豁達衆生清淨智圓滿無礙解脫門淨明道者未興一念底便是淨明道者得此呪本為題之云淨慈東嶼德海稽首觀音大悲心現千手眼不思議宣說祕密陀羅尼救度衆生震大地天人悲仰鬼神欽外道羣魔生布畏譬如日輪行虗空放大光明遍赫熾能摧一切障礙山能開一切金剛智能除衆生熱惱心令食甘露清涼味淨明道者日受持顯出無量大悲誓若還決定信無疑成就諸佛清淨慧徑山住持比丘𭤔陵說偈讚云正法明觀自在所說神呪號大悲拔濟衆生離苦海延祐己未秋淨因寺元明上人請贊故書甬東乾符比丘普容無聲無字一篇呪誰謂大悲無礙心展示諸方明眼者莫將黃葉作黃金延祐庚申孟夏蓮華院沙門義潤書于江城懺室一念大悲心十界咸圓滿本無一切相當試一切辨幻應叵測量強施千手眼遍遮一切惡總持一切善水濁月似亡水清月似現但了介爾性觸境即靈驗明師具此眼墨塵發光焰深諦大悲體克獲離諸見青天白日中有流多洄漩稽首大悲主恆興大方便天竺九品觀堂圓照再拜書稽首具足大悲心利生身現千手眼一身復現剎塵身妙智神通廣敷闡與拔遍至我無為由始那僧熏萬善中天日朗蔀或豐大地春回物何限爾欲真入持明門密語奇形莫分辨當頭一句解自持正法明王暗中顯明道人記敬書畫像大悲心陀羅尼後晉二十歲誦持大悲心陀羅尼聞谷大師云塵勞罪業智愚未免豪賤共有子能一宿誦滿五遍衆善競會萬惡爭消不可說不可說迄今五十歲惟日喃喃一念不動耳矣屆母難日蒼雪法師擕此策見示胡跪展玩繕寫白描楮墨如新恍如大地震動天雨寶華悲喜交集因稽首曰觀音大悲主本來無身現出千手千眼本來無字宣出神妙章句更有何代何人幻出四十九相好身俾中峯國師以下過去七人又各各綴偈讚于尾果光明幢印神通藏耶法師掩卷一笑曰請求之形相語言之外晉潛在拜識晉受持梵策又十年矣緇素相索隨喜者如雲因憬然曰建安自如贊嘆淨明道者課誦忘歲月適符大士付囑流通之意因即刊布八遐仰謝蒼雪老人持贈至誼時年六十有二晉載拜識
